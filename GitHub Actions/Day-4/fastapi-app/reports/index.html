<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 CI/CD Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: radial-gradient(circle at top, #1e293b, #020617);
            color: white;
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 40px 20px;
        }

        h1 {
            font-size: 34px;
            margin: 0;
            background: linear-gradient(90deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #94a3b8;
            margin-top: 10px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 25px;
            padding: 30px;
            max-width: 1100px;
            margin: auto;
        }

        .card {
            background: rgba(30, 41, 59, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 25px;
            text-align: center;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 10px 30px rgba(56, 189, 248, 0.15);
            border-color: rgba(56, 189, 248, 0.4);
        }

        .status {
            font-weight: bold;
            font-size: 1.2rem;
            margin: 15px 0;
        }

        .success { color: #22c55e; }
        .warning { color: #f59e0b; }
        .danger { color: #ef4444; }

        a {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 18px;
            background: #2563eb;
            border-radius: 8px;
            color: white;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
        }

        a:hover {
            background: #1d4ed8;
        }

        footer {
            text-align: center;
            padding: 40px 0;
            font-size: 12px;
            color: #64748b;
        }
    </style>
</head>

<body>

<header>
    <h1>🚀 CI/CD Dashboard</h1>
    <p id="lastUpdated">Fetching latest metrics...</p>
</header>

<div class="grid">

    <div class="card">
        <h3>🧪 Test Report</h3>
        <div id="testStatus" class="status">⌛ Loading...</div>
        <a href="test-report/report.html">View Report</a>
    </div>

    <div class="card">
        <h3>📊 Coverage</h3>
        <div id="coverageStatus" class="status">⌛ Loading...</div>
        <a href="test-report/htmlcov/index.html">View Coverage</a>
    </div>

    <div class="card">
        <h3>🧹 Lint</h3>
        <div id="lintStatus" class="status">⌛ Loading...</div>
        <a href="lint-report/flake8-report/index.html">View Report</a>
    </div>

    <div class="card">
        <h3>🔐 Security</h3>
        <div id="securityStatus" class="status">⌛ Loading...</div>
        <a href="security-report/bandit-report.html">View Report</a>
    </div>

    <div class="card">
        <h3>📦 Dependency</h3>
        <div id="dependencyStatus" class="status">⌛ Loading...</div>
        <a href="dependency-report/dependency-report.html">View Report</a>
    </div>

</div>

<footer>
    © 2026 CI/CD Dashboard • Generated by GitHub Actions
</footer>

<script>
    // Fetching status.json with a cache-buster to ensure we see new results
    fetch('status.json?t=' + new Date().getTime())
        .then(res => {
            if (!res.ok) throw new Error('Network response was not ok');
            return res.json();
        })
        .then(data => {

            function setStatus(id, value) {
                const el = document.getElementById(id);
                if(!el) return;

                if (value === "passed") {
                    el.innerHTML = "✔ Passed";
                    el.className = "status success";
                } else if (value === "warning") {
                    el.innerHTML = "⚠ Warning";
                    el.className = "status warning";
                } else {
                    el.innerHTML = "❌ Failed";
                    el.className = "status danger";
                }
            }

            setStatus("testStatus", data.tests);
            setStatus("lintStatus", data.lint);
            setStatus("securityStatus", data.security);
            setStatus("dependencyStatus", data.dependency);

            // Coverage Logic
            const covEl = document.getElementById("coverageStatus");
            const covValue = parseFloat(data.coverage) || 0;
            covEl.innerHTML = "✔ " + covValue + "%";
            covEl.className = covValue < 80 ? "status warning" : "status success";

            // Timestamp
            document.getElementById("lastUpdated").innerText = 
                "Last updated: " + new Date().toLocaleString();
        })
        .catch(err => {
            console.error("Fetch error:", err);
            document.getElementById("lastUpdated").innerText = 
                "⚠ Error: Could not load status.json. Ensure the pipeline has run successfully.";
            
            // Turn all loading states to Error
            document.querySelectorAll('.status').forEach(el => {
                el.innerHTML = "Error";
                el.className = "status danger";
            });
        });
</script>

</body>
</html>
