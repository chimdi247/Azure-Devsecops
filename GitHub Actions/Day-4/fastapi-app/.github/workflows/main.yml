name: FastAPI CI/CD Pipeline
on: workflow_dispatch
env:
  IMAGE_NAME: fastapi-app
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-html
          # pytest → Runs your test cases
          # pytest-cov → Measures how much of your code is covered by tests
          # pytest-html → Generates a readable HTML report of test results
      - name: Run Tests
        run: |
          pytest \
          --junitxml=report.xml \
          --cov=app \
          --cov-report=xml \
          --cov-report=html \
          --html=report.html \
          --self-contained-html \
          --cov-fail-under=80
      - name: Extract Coverage %
        run: |
          # Run an inline Python script inside the shell

          python <<EOF

          import xml.etree.ElementTree as ET # Used to parse XML files

          import json # Used to create/update JSON status file

          # Parse the coverage.xml file generated by pytest-cov

          tree = ET.parse("coverage.xml")

          root = tree.getroot()

          # Extract the line coverage rate (value between 0 and 1)

          # Convert it into percentage (0–100)

          coverage = float(root.attrib.get("line-rate", 0)) * 100

          # Create a centralized status file for the pipeline

          # This file will be updated in later stages (lint, security, dependency scan)

          with open("status.json", "w") as f:
              json.dump({
                  "tests": "passed",    # Mark tests as passed
                  "coverage": round(coverage, 2), # Store coverage with 2 decimal precision
                  "lint": "unknown", # Placeholder (updated in lint stage)
                  "security": "unknown",  # Placeholder (updated in security stage)
                  "dependency": "unknown"  # Placeholder (updated in dependency scan)
              }, f)
          EOF
      - name: Upload Test Reports + Status
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: |
            report.xml   
            report.html  
            coverage.xml  
            htmlcov/      
            status.json   
  lint:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: test-report
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install Linter
        run: pip install flake8 flake8-html
      - name: Run Lint
        run: |
          flake8 . --format=html --htmldir=flake8-report

          # Run flake8 and generate an HTML report in 'flake8-report' directory


          ERRORS=$(flake8 . --count --max-line-length=120 2>/dev/null | tail -n 1)
              # Run flake8 again to count total number of errors
              # --count prints total issues
              # --max-line-length=120 sets allowed line length
              # 2>/dev/null hides warnings/errors from output
              # tail -n 1 extracts only the final count value
          # Inline Python script to update shared pipeline status

          python <<EOF

          import json

          # Load existing status file generated in test stage

          with open("status.json") as f:
              status = json.load(f)
          # Convert error count to integer safely

          try:
              errors = int("$ERRORS".strip())
          except:
              errors = 1
            # Update lint status:
            # - "passed" if no errors
            # - "warning" if any issues found
          status["lint"] = "warning" if errors > 0 else "passed"

          # Save updated status back to file for next stages

          with open("status.json", "w") as f:
              json.dump(status, f)
          EOF
      - name: Upload Lint Report
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: |
            flake8-report 
            status.json   
  security:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: lint-report # Download artifacts from lint stage (includes status.json)
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'  # Set up Python environment for this job
      - name: Install Bandit
        run: pip install bandit # Install Bandit (Python security scanner)
      - name: Run Security Scan
        run: |
          # Run Bandit scan on 'app/' directory recursively
          # Generate JSON report (used for automation/processing)
          bandit -r app/ -f json -o bandit-report.json || true
          # Generate HTML report (used for human-readable dashboard)
          bandit -r app/ -f html -o bandit-report.html || true
          # Inline Python script to update pipeline status
          python <<EOF
          import json
          # Load existing pipeline status file (from previous stage)
          with open("status.json") as f:
              status = json.load(f)
          # Read Bandit JSON report
          data = json.load(open("bandit-report.json"))
          # Extract list of detected security issues
          issues = data.get("results", [])
          # Update security status:
          status["security"] = "passed" if len(issues) == 0 else "warning"
          # Save updated status back to file for next stages
          with open("status.json", "w") as f:
              json.dump(status, f)
          EOF
      - name: Upload Security Reports
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: |
            bandit-report.*
            status.json
  dependency-scan:
    runs-on: ubuntu-latest
    needs: security
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4 
        with:
          name: security-report # Download artifacts from security stage (includes status.json)
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip  # Enable pip caching for faster installs
      - name: Install Dependencies + pip-audit
        run: |
          # Install project dependencies
          pip install -r requirements.txt
          # Install pip-audit (used to detect vulnerabilities in dependencies)
          pip install pip-audit
      - name: Run Dependency Scan
        run: |
          # Scan dependencies listed in requirements.txt
          # Output results in JSON format
          pip-audit -r requirements.txt -f json -o dependency-report.json || true

          # Inline Python script to process results and update pipeline status
          python <<EOF
          import json

          # Load shared pipeline status file
          with open("status.json") as f:
              status = json.load(f)
          # Load dependency scan results
          data = json.load(open("dependency-report.json"))

          # Count total vulnerabilities across all dependencies
          vulns = sum(len(dep.get("vulns", [])) for dep in data.get("dependencies", []))

          # Update dependency status:
          status["dependency"] = "passed" if vulns == 0 else "warning"

          # Save updated status for next stages
          with open("status.json", "w") as f:
              json.dump(status, f)
          EOF
      - name: Generate HTML Report
        run: |
          # Convert JSON report into a simple HTML table for visualization
          python <<EOF
          import json
          data = json.load(open("dependency-report.json"))
          rows = ""
          # Iterate over dependencies and their vulnerabilities
          for dep in data.get("dependencies", []):
              for v in dep.get("vulns", []):
                  rows += f"<tr><td>{dep.get('name')}</td><td>{dep.get('version')}</td><td>{v.get('id')}</td><td>{v.get('description')}</td></tr>"
          # If no vulnerabilities found, show success message
          if rows == "":
              rows = "<tr><td colspan='4'>✅ No vulnerabilities found</td></tr>"
          # Build HTML content
          html = f"""
          <html>
          <head>
              <title>Dependency Scan Report</title>
          </head>
          <body>
              <h1>Dependency Scan (pip-audit)</h1>
              <table border="1">
                  <tr><th>Package</th><th>Version</th><th>Vulnerability</th><th>Description</th></tr>
                  {rows}
              </table>
          </body>
          </html>
          """
          # Write HTML report to file
          with open("dependency-report.html", "w") as f:
              f.write(html)
          EOF
      - name: Upload Dependency Reports
        uses: actions/upload-artifact@v4
        with:
          name: dependency-report
          path: |
            dependency-report.*
            status.json
  deploy-report:
    runs-on: ubuntu-latest
    needs: dependency-scan
    steps:
      - uses: actions/checkout@v4 # Clone repository (needed for index.html or static files)
      - name: Download All Artifacts 
        uses: actions/download-artifact@v4  # Downloads ALL artifacts from previous jobs
      - name: Prepare Site
        run: |
          # Create base directory for GitHub Pages site
          mkdir -p site

          # Copy main dashboard HTML (your custom index page)
          cp reports/index.html site/index.html

          # Disable Jekyll processing (important for folders/files starting with _)
          touch site/.nojekyll

          # Create directories for each report section
          mkdir -p site/test-report
          mkdir -p site/lint-report
          mkdir -p site/security-report
          mkdir -p site/dependency-report

          # Copy reports into respective folders
          cp -r test-report/* site/test-report/ || true
          cp -r lint-report/* site/lint-report/ || true
          cp -r security-report/* site/security-report/ || true
          cp -r dependency-report/* site/dependency-report/ || true

          # Copy final pipeline status file to root of site (used by dashboard)
          cp dependency-report/status.json site/status.json
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: '${{ secrets.GITHUB_TOKEN }}' # Auth token provided by GitHub
          publish_dir: ./site # Directory to publish
          force_orphan: true  # Create clean gh-pages branch (no history)
  build-and-push:
    runs-on: ubuntu-latest
    needs: deploy-report
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: '${{ secrets.AZURE_CLIENT_ID }}'
          tenant-id: '${{ secrets.AZURE_TENANT_ID }}'
          subscription-id: '${{ secrets.AZURE_SUBSCRIPTION_ID }}'
      - name: Login to ACR
        run: |
          az acr login --name ${{ secrets.ACR_NAME }}
      - name: Set Image Tag
        run: |
          echo "IMAGE=${{ secrets.ACR_NAME }}.azurecr.io/fastapi-app:${{github.sha }}" >> $GITHUB_ENV

          echo "LATEST=${{ secrets.ACR_NAME }}.azurecr.io/fastapi-app:latest" >> $GITHUB_ENV
      - name: Build Image
        run: |
          docker build -t $IMAGE .
      - name: Tag Latest
        run: |
          docker tag $IMAGE $LATEST
      - name: Push Image
        run: |
          docker push $IMAGE
          docker push $LATEST
